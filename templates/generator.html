{% extends 'base.html' %}

{% block content %}
<section class="card-shell">
  <div class="row g-4 align-items-start">
    <div class="col-xl-5 col-lg-6">
      <div class="form-panel">
        <label for="templateSelect" class="form-label fw-semibold">Select Standard Template</label>
        <select id="templateSelect" class="form-select form-select-lg mb-3">
          {% for key, template in templates.items() %}
            <option value="{{ key }}">{{ template.label }}</option>
          {% endfor %}
        </select>

        <label for="cannedSelect" class="form-label fw-semibold">Or Load From Canned Email Database</label>
        <div class="input-group mb-3">
          <select id="cannedSelect" class="form-select">
            <option value="">Select canned email</option>
            {% for item in canned_emails %}
              <option value="{{ item.id }}" {% if selected_canned and selected_canned.id == item.id %}selected{% endif %}>{{ item.title }} ({{ item.category }})</option>
            {% endfor %}
          </select>
          <button id="loadCannedBtn" class="btn btn-outline-secondary" type="button">Load</button>
        </div>

        <div id="dynamicFields" class="dynamic-fields"></div>

        <div class="d-flex gap-2 mt-3 flex-wrap">
          <button id="generateBtn" class="btn btn-primary btn-lg" disabled>Generate Email</button>
          <button id="saveCustomBtn" class="btn btn-outline-secondary btn-lg d-none">Save Custom</button>
        </div>

        <p id="inlineStatus" class="small text-success mt-3 mb-0 opacity-0">Saved successfully</p>
      </div>

      <div id="savedTemplatesWrap" class="saved-templates mt-4 d-none">
        <h2 class="h6 mb-2">Saved Custom Templates</h2>
        <ul id="savedTemplates" class="list-group list-group-flush"></ul>
      </div>
    </div>

    <div class="col-xl-7 col-lg-6">
      <div class="output-panel">
        <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
          <h2 class="h6 mb-0">Email Preview (Editable)</h2>
          <div class="d-flex align-items-center gap-2">
            <button id="copyBtn" class="btn btn-sm btn-outline-primary" disabled>Copy</button>
            <span id="copyStatus" class="small text-success opacity-0">Copied!</span>
          </div>
        </div>

        <textarea id="outputEditor" class="email-editor" placeholder="Generated email will appear here. You can edit before copying..."></textarea>
      </div>

      <div class="history-panel mt-4">
        <h2 class="h6 mb-2">Recent Generated Emails</h2>
        <ul id="historyList" class="history-list mb-0"></ul>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block page_config %}
<script>
  window.APP_CONFIG = {
    templates: {{ templates | tojson }},
    fields: {{ field_definitions | tojson }},
    selectedCanned: {{ selected_canned | tojson }}
  };
</script>
{% endblock %}

{% block page_scripts %}
<script src="{{ url_for('static', filename='js/generator.js') }}"></script>
{% endblock %}
